services:
  - type: web
    name: ai-coach-backend
    runtime: node
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: gemini
